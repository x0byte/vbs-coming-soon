<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 — Volt Business Solutions</title>
  <meta name="description" content="The page you are looking for does not exist. Volt Business Solutions." />
  <meta name="theme-color" content="#ece9e5" />

  <style>
    :root {
      --ink: #0d1722;
      --muted: #89919a;
      --line: rgba(13, 23, 34, 0.12);
      --orange: #ff8a18;
      --panel-shadow: 0 42px 110px rgba(13, 23, 34, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #e8e5e1;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 105%, rgba(255, 255, 255, 0.95), transparent 36rem),
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.82), transparent 26rem),
        radial-gradient(circle at 85% 28%, rgba(234, 245, 255, 0.9), transparent 28rem),
        linear-gradient(135deg, #f0eeee 0%, #dedbd8 48%, #eeeeec 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 39%, rgba(255, 138, 24, 0.28), transparent 17rem),
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.82), transparent 34rem);
      filter: blur(4px);
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px;
    }

    .stage {
      position: relative;
      width: min(1380px, 100%);
      min-height: min(760px, calc(100vh - 96px));
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 22%, rgba(255, 138, 24, 0.42), transparent 18rem),
        radial-gradient(circle at 72% 38%, rgba(255, 255, 255, 0.9), transparent 20rem),
        linear-gradient(126deg, rgba(243, 249, 255, 0.92) 0%, rgba(255, 255, 255, 0.9) 48%, rgba(230, 243, 255, 0.82) 100%);
      box-shadow: var(--panel-shadow);
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      width: min(760px, 72vw);
      aspect-ratio: 1;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -46%);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 999px;
      opacity: 0.95;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 34%;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.54), transparent);
      pointer-events: none;
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      padding: 28px 38px 0;
      font-size: 14px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-logo {
      display: block;
      width: 198px;
      height: auto;
    }

    .right-nav {
      justify-self: end;
    }

    .talk {
      color: var(--ink);
      text-underline-offset: 4px;
      font-weight: 520;
    }

    .talk span {
      color: var(--orange);
      font-weight: 800;
    }

    .hero {
      position: relative;
      z-index: 2;
      min-height: 630px;
      display: grid;
      place-items: center;
      padding: 90px 32px 86px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(150px, 28vw, 360px);
      line-height: 0.76;
      letter-spacing: -0.12em;
      font-weight: 760;
    }

    .message {
      margin: 22px auto 0;
      color: #1d2731;
      font-size: clamp(18px, 1.7vw, 24px);
      letter-spacing: -0.035em;
      font-weight: 520;
    }

    .subcopy {
      max-width: 480px;
      margin: 12px auto 0;
      color: #818993;
      font-size: 15px;
      line-height: 1.55;
    }

    .cta-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 680;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .primary {
      min-width: 162px;
      color: #fff;
      background: var(--ink);
      box-shadow: 0 18px 38px rgba(13, 23, 34, 0.18);
    }

    .primary span {
      margin-left: 10px;
      color: var(--orange);
      font-size: 18px;
      line-height: 1;
    }

    .secondary {
      color: var(--ink);
      border: 1px solid rgba(13, 23, 34, 0.11);
      background: rgba(255, 255, 255, 0.48);
    }

    @media (max-width: 820px) {
      .page {
        padding: 22px;
      }

      .stage {
        min-height: calc(100vh - 44px);
        border-radius: 28px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        padding: 28px 30px 0;
      }

      .right-nav .talk {
        display: none;
      }

      .hero {
        min-height: calc(100vh - 120px);
        padding: 74px 26px 110px;
        place-items: center;
      }

      .stage::before {
        width: 76vw;
        top: 42%;
      }

      h1 {
        font-size: clamp(118px, 38vw, 190px);
      }

    }

    @media (max-width: 480px) {
      .brand-logo {
        width: 172px;
        height: auto;
      }

      .secondary {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="stage" aria-labelledby="page-title">
      <header class="topbar">
        <a class="brand" href="/" aria-label="Volt Business Solutions">
          <img class="brand-logo" src="assets/Frame 27 transparent.png" alt="Volt Business Solutions" />
        </a>

        <div class="right-nav">
          <a class="talk" href="mailto:info@vbs.lk">Let’s talk <span>↗</span></a>
        </div>
      </header>

      <div class="hero">
        <div>
          <h1 id="page-title">404</h1>
          <p class="message">This page doesn’t exist</p>
          <p class="subcopy">
            The page may have moved, or the address may be wrong. Head back to Volt Business Solutions.
          </p>

          <div class="cta-row">
            <a class="button primary" href="/">Return home <span>↗</span></a>
            <a class="button secondary" href="mailto:info@vbs.lk">info@vbs.lk</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
