# nginx server block for vbs.lk (static site).
# Install at /etc/nginx/sites-available/vbs.lk, symlink into sites-enabled.
# Assumes certbot has already issued a cert for vbs.lk + www.vbs.lk (see deploy/README.md).

server {
    listen 80;
    listen [::]:80;
    server_name vbs.lk www.vbs.lk;

    # Let certbot's HTTP-01 challenge through before TLS is issued; after that,
    # certbot's nginx plugin rewrites this block to redirect to https automatically.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://vbs.lk$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vbs.lk www.vbs.lk;

    ssl_certificate     /etc/letsencrypt/live/vbs.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vbs.lk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/vbs.lk;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # /apply -> apply.html, without exposing the .html extension.
    location = /apply {
        try_files /apply.html =404;
    }

    # Extensionless paths in general (e.g. future /about) fall back to <name>.html.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
